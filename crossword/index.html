<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Security Crossword Challenge | Suraksha Guide</title>
    <meta name="description" content="Play the Security Crossword Challenge and improve your knowledge of security, safety, fire protection, CCTV, access control and emergency response.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Header -->
    <header>

        <h1>🛡 Security Crossword Challenge</h1>

        <p>
            Test your Security Knowledge by solving the crossword puzzle.
        </p>

    </header>


    <!-- Top Info -->

    <section class="top-bar">

        <div class="score-box">

            <span>Score</span>

            <strong id="score">0</strong>

        </div>

        <div class="timer-box">

            <span>Time</span>

            <strong id="timer">00:00</strong>

        </div>

    </section>



    <!-- Crossword Area -->

    <section class="game-area">

        <div id="crossword-grid">

            <!-- JavaScript Creates Grid -->

        </div>

    </section>



    <!-- Hints -->

    <section class="hints">

        <h2>Hints</h2>

        <ol id="hint-list">

        </ol>

    </section>



    <!-- Buttons -->

    <section class="buttons">

        <button id="checkBtn">

            ✔ Check Answers

        </button>

        <button id="hintBtn">

            💡 Hint

        </button>

        <button id="resetBtn">

            🔄 Reset

        </button>

        <button id="revealBtn">

            👁 Reveal

        </button>

    </section>



    <!-- Result -->

    <section class="result">

        <h2 id="message">

            Good Luck!

        </h2>

    </section>



</div>

<script src="script.js"></script>

</body>
</html>
